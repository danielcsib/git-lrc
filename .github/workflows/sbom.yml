name: sbom

on:
  workflow_dispatch: {}
  release:
    types:
      - published
  push:
    branches:
      - main
      - master
    paths:
      - go.mod
      - go.sum
      - Makefile
      - .github/workflows/sbom.yml

jobs:
  generate-sbom:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Install syft
        run: |
          curl -sSfL https://raw.githubusercontent.com/anchore/syft/main/install.sh | sh -s -- -b /usr/local/bin v1.25.0
          syft version

      - name: Generate SBOM files
        run: make security-sbom

      - name: Upload SBOM artifacts
        uses: actions/upload-artifact@v4
        with:
          name: sbom-git-lrc-${{ github.run_id }}
          path: security_issues/sbom/*.json
          if-no-files-found: error
          retention-days: 30

  publish-release-assets:
    if: github.event_name == 'release'
    needs:
      - generate-sbom
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download SBOM artifacts
        uses: actions/download-artifact@v4
        with:
          name: sbom-git-lrc-${{ github.run_id }}
          path: security_issues/sbom

      - name: Upload SBOMs to release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            security_issues/sbom/*.json
